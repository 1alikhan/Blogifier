services:
  mysql:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --lower_case_table_names=1
      - --performance_schema=off
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: blogifier
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always
    command: --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data

  blogifier:
    build: .
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      Blogifier__DbProvider: MySql
      Blogifier__ConnString: "Server=mysql;Database=blogifier;User=root;Password=${MYSQL_ROOT_PASSWORD};"
      Blogifier__Redis: "redis:6379,password=${REDIS_PASSWORD},defaultDatabase=0"
      Blogifier__Salt: "${BLOGIFIER_SALT}"
      ASPNETCORE_URLS: "http://+:8080"
    volumes:
      - blogifier_data:/opt/blogifier/App_Data
    mem_limit: 512MB

volumes:
  mysql_data:
  redis_data:
  blogifier_data: